name: macos-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.native
        run: echo "VITE_BACKEND_URL=https://kawazplus.com" > .env.native

      - name: Build web app for native
        run: npm run build:native

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Generate macOS icons from source icon
        run: |
          for size in 16 32 128 256 512; do
            magick assets/icon.png -resize ${size}x${size} \
              "macos/App/App/Assets.xcassets/AppIcon.appiconset/icon_${size}x${size}.png"
            magick assets/icon.png -resize $((size*2))x$((size*2)) \
              "macos/App/App/Assets.xcassets/AppIcon.appiconset/icon_${size}x${size}@2x.png"
          done

      - name: Import signing certificates
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=temporarypassword

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          echo "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/installer-cert.p12
          security import $RUNNER_TEMP/installer-cert.p12 \
            -P "$INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install macOS provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/macos-profile.provisionprofile
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          UUID=$(security cms -D -i "$PP_PATH" \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile

          echo "MACOS_PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Build archive
        working-directory: macos/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath $RUNNER_TEMP/MacApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE="$MACOS_PROFILE_UUID"

      - name: Package into pkg
        run: |
          APP_PATH=$(find $RUNNER_TEMP/MacApp.xcarchive -name "*.app" | head -1)
          productbuild \
            --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer" \
            $RUNNER_TEMP/App.pkg

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/App.pkg \
            -t osx \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: kawaz-macos-${{ github.ref_name }}
          path: ${{ runner.temp }}/App.pkg
          retention-days: 30
