name: kawaz-frontend

on:
  push:
    branches: [master]
    paths: ['services/kawaz-frontend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kawaz-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/kawaz-frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/kawaz-frontend \
            kawaz-frontend=${{ env.IMAGE }}:${{ github.sha }} \
            --namespace kawaz
          kubectl rollout status deployment/kawaz-frontend --namespace kawaz --timeout=60s